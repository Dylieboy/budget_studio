services:
  - type: web
    name: budget-studio-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: budget-studio-db
          property: connectionString
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAMESITE
        value: None
      - key: CORS_ORIGINS
        value: https://your-vercel-app.vercel.app

databases:
  - name: budget-studio-db
    databaseName: budget_studio
    user: budget_studio_user
